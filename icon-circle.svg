<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="smile:D">
  <defs>
    <filter id="circleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="220" fill="#ffffff" filter="url(#circleShadow)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#0a0a0a" stroke-width="2" opacity="0.08"/>
  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif"
    font-weight="700"
    font-size="170"
    fill="#0a0a0a"
    filter="url(#markShadow)"
  >:D</text>
</svg>
